<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICH-VOICE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Авторизация -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2 id="authTitle">Вход в RICH-VOICE</h2>
            <div id="errorMessage" class="error-message"></div>
            <input type="text" id="usernameInput" placeholder="Имя пользователя" autocomplete="username">
            <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="current-password">
            <button id="authButton" onclick="handleAuth()">Войти</button>
            <div id="switchLink" class="switch-link" onclick="switchAuthMode()">Нет аккаунта? Зарегистрироваться</div>
        </div>
    </div>

    <!-- Основной чат -->
    <div id="chatContainer" class="chat-wrapper">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>📺 Каналы</h2>
            </div>
            <div class="channels-list" id="channelsList"></div>
            <div class="sidebar-header">
                <h2>🟢 В сети</h2>
            </div>
            <div class="online-list" id="onlineList"></div>
            <div class="online-count" id="onlineCount">Онлайн: 0</div>
        </div>

        <!-- Основная область чата -->
        <div class="chat-main">
            <!-- Шапка канала -->
            <div class="channel-header">
                <h2 id="channelTitle">💬 Болталка</h2>
                <div class="user-info">
                    <div id="currentUser"></div>
                    <button class="change-avatar-btn" onclick="openAvatarModal()">📷 Аватар</button>
                    <button class="join-voice-btn" id="joinVoiceBtn" onclick="toggleVoiceRoom()">🎤 Голосовая комната</button>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>
            </div>

            <!-- Панель голосовой комнаты -->
            <div id="voiceRoomPanel" class="voice-room-panel">
                <div class="voice-room-header">
                    <h3>🎤 Голосовая комната</h3>
                    <div class="voice-controls">
                        <button id="muteBtn" class="voice-btn mute" onclick="toggleMute()">🎤 Вкл</button>
                        <button id="pttToggleBtn" class="voice-btn" onclick="togglePTT()">🔕 PTT: ВЫКЛ</button>
                        <button id="pttKeyBtn" class="voice-btn" onclick="setPTTKey()">Клавиша: Пробел</button>
                        <button class="voice-btn leave" onclick="leaveVoiceRoom()">🚪 Выйти</button>
                    </div>
                </div>
                <div id="voiceParticipants" class="voice-participants"></div>
            </div>

            <!-- Сообщения -->
            <div class="messages" id="messages"></div>

            <!-- Ввод сообщения -->
            <div class="input-area">
                <div class="input-toolbar">
                    <button class="toolbar-btn" onclick="toggleEmojiPanel()">😊 Эмодзи</button>
                    <button class="toolbar-btn" onclick="document.getElementById('fileInput').click()">🖼️ Картинка</button>
                    <button class="toolbar-btn" onclick="document.getElementById('audioInput').click()">🎵 Музыка</button>
                    <input type="file" id="fileInput" class="file-input" accept="image/*" onchange="handleFileUpload(event)">
                    <input type="file" id="audioInput" class="file-input" accept="audio/*" onchange="handleAudioUpload(event)">
                </div>
                <div id="emojiPanel" class="emoji-panel">
                    <div class="emoji-grid" id="emojiGrid"></div>
                </div>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Введите сообщение... (@ для упоминания)">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Окно приватного чата -->
    <div id="privateChatWindow" class="private-chat-window">
        <div class="private-chat-header">
            <span>🔒 ЛС с <span id="privateChatUser"></span></span>
            <button class="close-private-chat" onclick="closePrivateChat()">✖️</button>
        </div>
        <div class="private-messages" id="privateMessages"></div>
        <div class="private-input-area">
            <input type="text" id="privateMessageInput" placeholder="Сообщение...">
            <button onclick="sendPrivateMessage()">Отправить</button>
        </div>
    </div>

    <!-- Модальное окно аватара -->
    <div id="avatarModal" class="avatar-modal">
        <div class="avatar-modal-content">
            <div class="avatar-modal-header">
                <h3>📷 Сменить аватар</h3>
                <button class="close-avatar-modal" onclick="closeAvatarModal()">✖️</button>
            </div>
            <div class="avatar-preview">
                <img id="currentAvatarPreview" class="avatar-large" alt="Аватар">
            </div>
            <button class="avatar-upload-btn" onclick="document.getElementById('avatarInput').click()">
                📤 Загрузить новый аватар
            </button>
            <input type="file" id="avatarInput" class="file-input" accept="image/*" onchange="handleAvatarUpload(event)">
            <button class="avatar-remove-btn" onclick="removeAvatar()">🗑️ Удалить аватар</button>
        </div>
    </div>

    <!-- Toast-уведомление -->
    <div id="toast" class="toast-notification"></div>
    <div id="notificationPopup" class="notification-popup"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="auth.js"></script>
    <script src="voice.js"></script>
    <script src="app.js"></script>
</body>
</html>
