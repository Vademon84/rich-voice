<!DOCTYPE html>
<html lang="ru">
<head>

    <title>RICH-VOICE</title>
    <style>

        .auth-container {

        }
        .auth-box input {

            border: none;

            background: #40444b;

        }
        .auth-box input:focus {

        }
        .auth-box button {

            padding: 12px;

            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;

            font-size: 16px;

        }
        .auth-box button:hover {
            background: #00b85c;
        }
        .auth-box .switch-link {
            text-align: center;
            color: #00d26a;
            cursor: pointer;
            font-size: 14px;
        }
        .auth-box .switch-link:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ed4245;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .chat-wrapper {
            display: none;
            height: 100vh;
            flex-direction: row;
        }
        
        .sidebar {
            width: 240px;

            border-right: 1px solid #202225;

        .sidebar-header {

        .online-count {

        }
        
        .chat-main {

        }
        .header {
            background: #2f3136;
            padding: 15px 20px;
            border-bottom: 1px solid #202225;

        .user-info {

        }
        .username-display {

        }
        .logout-btn {

            border-radius: 5px;

            cursor: pointer;

        }
        .logout-btn:hover {

        }
        .messages {

        }
        .message {

        }
        .message-header {

            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .message .username {

        }
        .message-time {

        }
        .message-content {
            word-wrap: break-word;
            line-height: 1.4;
        }
        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 5px;
            margin-top: 8px;
            cursor: pointer;
        }
        .audio-player {
            background: #2f3136;
            padding: 10px;
            border-radius: 5px;
            margin-top: 8px;
        }
        .audio-player audio {

        }
        .audio-controls {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .audio-controls button {
            padding: 5px 10px;
            background: #00d26a;
            border: none;
            border-radius: 3px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        .audio-controls button:hover {
            background: #00b85c;
        }
        
        .system-message {
            text-align: center;
            padding: 8px;
            margin-bottom: 10px;
            color: #72767d;

            font-style: italic;
        }
        .system-message.join {
            color: #00d26a;
        }
        .system-message.leave {
            color: #ed4245;
        }
        
        .input-area {
            background: #2f3136;
            padding: 15px 20px;
            border-top: 1px solid #202225;
        }
        .input-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .toolbar-btn {
            padding: 8px 12px;
            background: #40444b;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar-btn:hover {
            background: #484b52;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        .input-row input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 5px;
            background: #40444b;
            color: white;
            font-size: 14px;
        }
        .input-row input:focus {
            outline: none;
            background: #484b52;
        }
        .input-row button {
            padding: 12px 25px;
            background: #00d26a;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .input-row button:hover {
            background: #00b85c;
        }
        
        .emoji-panel {
            display: none;
            background: #2f3136;
            border: 1px solid #202225;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .emoji-panel.show {
            display: block;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
        }
        .emoji-btn {
            padding: 8px;
            background: #40444b;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
        }
        .emoji-btn:hover {
            background: #484b52;
        }
        
        .file-input {
            display: none;
        }
        
        /* Стили для голосовой комнаты */
        .voice-room-panel {
            background: #2f3136;
            border-bottom: 1px solid #202225;
            padding: 15px 20px;
            display: none;
        }
        .voice-room-panel.active {
            display: block;
        }
        .voice-room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .voice-room-header h3 {
            color: #00d26a;
            font-size: 16px;
        }
        .voice-controls {
            display: flex;
            gap: 10px;
        }
        .voice-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .voice-btn.join {
            background: #00d26a;
            color: white;
        }
        .voice-btn.join:hover {
            background: #00b85c;
        }
        .voice-btn.leave {
            background: #ed4245;
            color: white;
        }
        .voice-btn.leave:hover {
            background: #c03537;
        }
        .voice-btn.mute {
            background: #faa61a;
            color: white;
        }
        .voice-btn.mute:hover {
            background: #e69515;
        }
        .voice-participants {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .voice-participant {
            background: #40444b;
            padding: 8px 12px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .voice-participant.speaking {
            border: 2px solid #00d26a;
            box-shadow: 0 0 10px rgba(0, 210, 106, 0.5);
        }
        .voice-participant .mic-icon {
            font-size: 16px;
        }
        .voice-participant.muted .mic-icon {
            opacity: 0.5;
        }
        
        .join-voice-btn {
            padding: 8px 15px;
            background: #5865f2;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .join-voice-btn:hover {
            background: #4752c4;
        }
    </style>
</head>
<body>
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <h2 id="authTitle">Вход в RICH-VOICE</h2>
            <div class="error-message" id="errorMessage"></div>
            <input type="text" id="usernameInput" placeholder="Имя пользователя" autocomplete="off">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="authButton" onclick="handleAuth()">Войти</button>
            <div class="switch-link" id="switchLink" onclick="switchAuthMode()">Нет аккаунта? Зарегистрироваться</div>
        </div>
    </div>
    
    <div class="chat-wrapper" id="chatContainer">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🟢 В сети</h2>
            </div>
            <div class="online-list" id="onlineList"></div>
            <div class="online-count" id="onlineCount">Онлайн: 0</div>
        </div>
        
        <div class="chat-main">
            <div class="header">
                <h1>💬 RICH-VOICE - Общий чат</h1>
                <div class="user-info">
                    <button class="join-voice-btn" id="joinVoiceBtn" onclick="toggleVoiceRoom()">🎤 Голосовая комната</button>
                    <span class="username-display" id="currentUser"></span>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>
            </div>
            
            <!-- Панель голосовой комнаты -->
            <div class="voice-room-panel" id="voiceRoomPanel">
                <div class="voice-room-header">
                    <h3> Голосовая комната</h3>
                    <div class="voice-controls">
                        <button class="voice-btn mute" id="muteBtn" onclick="toggleMute()">🎤 Вкл</button>
                        <button class="voice-btn leave" onclick="leaveVoiceRoom()"> Выйти</button>
                    </div>
                </div>
                <div class="voice-participants" id="voiceParticipants"></div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area">
                <div class="emoji-panel" id="emojiPanel">
                    <div class="emoji-grid" id="emojiGrid"></div>
                </div>
                
                <div class="input-toolbar">
                    <button class="toolbar-btn" onclick="toggleEmojiPanel()">😊 Эмодзи</button>
                    <button class="toolbar-btn" onclick="document.getElementById('imageInput').click()">🖼️ Картинка</button>
                    <button class="toolbar-btn" onclick="document.getElementById('audioInput').click()" style="display: none;">🎵 Музыка</button>
                </div>
                
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
                
                <input type="file" id="imageInput" class="file-input" accept="image/*" onchange="handleImageUpload(event)">
                <input type="file" id="audioInput" class="file-input" accept="audio/*,video/*" onchange="handleAudioUpload(event)">
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let currentUser = null;
        let isLoginMode = true;
        let socket = null;
        let audioUploadWidget = null;
        let imageUploadWidget = null;
        
        // Голосовая комната
        let localStream = null;
        let peerConnections = new Map();
        let isInVoiceRoom = false;
        let isMuted = false;
        const ROOM_ID = 'general';
        const ICE_SERVERS = [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ];
        
        const authContainer = document.getElementById('authContainer');
        const chatContainer = document.getElementById('chatContainer');
        const authTitle = document.getElementById('authTitle');
        const authButton = document.getElementById('authButton');
        const switchLink = document.getElementById('switchLink');
        const errorMessage = document.getElementById('errorMessage');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const currentUserDisplay = document.getElementById('currentUser');
        const onlineList = document.getElementById('onlineList');
        const onlineCount = document.getElementById('onlineCount');
        const emojiPanel = document.getElementById('emojiPanel');
        const emojiGrid = document.getElementById('emojiGrid');
        const voiceRoomPanel = document.getElementById('voiceRoomPanel');
        const voiceParticipants = document.getElementById('voiceParticipants');
        const muteBtn = document.getElementById('muteBtn');
        const joinVoiceBtn = document.getElementById('joinVoiceBtn');

        const emojis = ['😀', '😃', '😄', '', '😆', '😅', '', '😂', '🙂', '', '😉', '😊', '😇', '🥰', '😍', '', '😘', '😗', '😚', '😙', '😋', '😛', '😜', '🤪', '😝', '🤑', '', '🤭', '🤫', '🤔', '', '🤨', '😐', '😑', '😶', '😏', '😒', '🙄', '😬', '🤥', '😌', '😔', '😪', '🤤', '😴', '😷', '🤕', '🤢', '🤮', '', '🥴', '😵', '🤯', '', '😎', '🤓', '🧐', '😕', '😟', '🙁', '☹️', '', '😯', '😲', '', '🥺', '😦', '😧', '😨', '😰', '😥', '😢', '😭', '😱', '😖', '😣', '😞', '😓', '😩', '😫', '🥱', '😤', '😡', '😠', '', '😈', '👿', '💀', '☠️', '💩', '🤡', '👹', '', '👻', '', '👾', '🤖', '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔', '❣️', '💕', '💞', '', '💗', '💖', '', '💝', '💟', '⭐', '🌟', '✨', '', '🔥', '🌈', '☀️', '⛅', '☁️', '🌧️', '❄️', '☃️', '💨', '💧', '', '🌊'];

        function initEmojiPanel() {
            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'emoji-btn';
                btn.textContent = emoji;
                btn.onclick = () => insertEmoji(emoji);
                emojiGrid.appendChild(btn);
            });
        }

        function toggleEmojiPanel() {
            emojiPanel.classList.toggle('show');
        }

        function insertEmoji(emoji) {
            messageInput.value += emoji;
            messageInput.focus();
        }

        async function uploadToCloudinary(file, resourceType) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'rich-voice');
            formData.append('cloud_name', 'dtvg9tzql');
            
            try {
                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/dtvg9tzql/${resourceType}/upload`,
                    { method: 'POST', body: formData }
                );
                
                const data = await response.json();
                
                if (data.secure_url) {
                    return {
                        success: true,
                        url: data.secure_url,
                        fileName: data.original_filename + '.' + data.format
                    };
                } else {
                    throw new Error(data.error?.message || 'Ошибка загрузки');
                }
            } catch (error) {
                console.error('Ошибка загрузки на Cloudinary:', error);
                return { success: false, error: error.message };
            }
        }

        async function handleAudioUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            console.log('🎵 Загрузка аудио:', file.name, (file.size / 1024 / 1024).toFixed(2), 'MB');
            
            const result = await uploadToCloudinary(file, 'video');
            
            if (result.success) {
                console.log('✅ Аудио загружено:', result.url);
                socket.emit('audio_upload', {
                    username: currentUser,
                    fileUrl: result.url,
                    fileName: result.fileName
                });
            } else {
                alert('Ошибка загрузки: ' + result.error);
            }
            
            event.target.value = '';
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            console.log('🖼️ Загрузка изображения:', file.name, (file.size / 1024 / 1024).toFixed(2), 'MB');
            
            const result = await uploadToCloudinary(file, 'image');
            
            if (result.success) {
                console.log('✅ Изображение загружено:', result.url);
                socket.emit('image_upload', {
                    username: currentUser,
                    fileUrl: result.url,
                    fileName: result.fileName
                });
            } else {
                alert('Ошибка загрузки: ' + result.error);
            }
            
            event.target.value = '';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('richvoice_user');
            if (savedUser) {
                currentUser = savedUser;
                showChat();
            }
            initEmojiPanel();
        });

        function formatDateTime(dateString) {
            const date = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            const isToday = date.toDateString() === today.toDateString();
            const isYesterday = date.toDateString() === yesterday.toDateString();
            
            const time = date.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            if (isToday) {
                return `Сегодня, ${time}`;
            } else if (isYesterday) {
                return `Вчера, ${time}`;
            } else {
                return date.toLocaleDateString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                }) + ', ' + time;
            }
        }

        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            errorMessage.textContent = '';
            
            if (isLoginMode) {
                authTitle.textContent = 'Вход в RICH-VOICE';
                authButton.textContent = 'Войти';
                switchLink.textContent = 'Нет аккаунта? Зарегистрироваться';
            } else {
                authTitle.textContent = 'Регистрация в RICH-VOICE';
                authButton.textContent = 'Зарегистрироваться';
                switchLink.textContent = 'Уже есть аккаунт? Войти';
            }
        }

        async function handleAuth() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                errorMessage.textContent = 'Заполните все поля';
                return;
            }
            
            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('richvoice_user', data.username);
                    currentUser = data.username;
                    showChat();
                } else {
                    errorMessage.textContent = data.error;
                }
            } catch (error) {
                errorMessage.textContent = 'Ошибка подключения к серверу';
                console.error(error);
            }
        }

        function showChat() {
            authContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            currentUserDisplay.textContent = currentUser;
            
            socket = io({
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000,
                maxHttpBufferSize: 1e8
            });
            
            socket.emit('user_join', currentUser);
            loadMessages();
            
            socket.on('message', (data) => displayMessage(data));
            socket.on('system_message', (data) => displaySystemMessage(data));
            socket.on('online_users', (users) => updateOnlineList(users));
            socket.on('audio_control', (data) => handleRemoteAudioControl(data));
            
            // Голосовая комната - обработчики
            socket.on('voice_participants', (participants) => {
                updateVoiceParticipants(participants);
            });
            
            socket.on('voice_user_joined', async (data) => {
                console.log('🎤 Новый участник в комнате:', data.username);
                await createPeerConnection(data.socketId, data.username, true);
            });
            
            socket.on('voice_user_left', (data) => {
                console.log('🔇 Участник вышел:', data.username);
                closePeerConnection(data.socketId);
            });
            
            socket.on('voice_signal', async (data) => {
                console.log('📡 Получен сигнал от:', data.socketId);
                await handleSignal(data.socketId, data.signal);
            });
            
            socket.on('voice_ice_candidate', (data) => {
                handleIceCandidate(data.socketId, data.candidate);
            });
        }

        function updateOnlineList(users) {
            onlineList.innerHTML = '';
            users.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'online-user';
                userDiv.innerHTML = `
                    <div class="status-dot"></div>
                    <span>${user}</span>
                `;
                onlineList.appendChild(userDiv);
            });
            onlineCount.textContent = `Онлайн: ${users.length}`;
        }

        async function loadMessages() {
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();
                
                messagesDiv.innerHTML = '';
                messages.forEach(msg => {
                    displayMessage({
                        username: msg.username,
                        type: msg.type,
                        text: msg.text,
                        fileUrl: msg.fileUrl,
                        fileName: msg.fileName,
                        createdAt: msg.createdAt
                    });
                });
            } catch (error) {
                console.error('Ошибка загрузки сообщений:', error);
            }
        }

        function displayMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const time = data.createdAt ? formatDateTime(data.createdAt) : 'Только что';
            
            let contentHtml = '';
            
            if (data.type === 'text') {
                contentHtml = `<div class="message-content">${escapeHtml(data.text)}</div>`;
            } else if (data.type === 'image') {
                contentHtml = `
                    <div class="message-content">️ ${escapeHtml(data.fileName)}</div>
                    <img src="${data.fileUrl}" class="message-image" onclick="window.open('${data.fileUrl}', '_blank')">
                `;
            } else if (data.type === 'audio') {
                const safeFileName = escapeHtml(data.fileName).replace(/'/g, "\\'");
                contentHtml = `
                    <div class="message-content">🎵 ${escapeHtml(data.fileName)}</div>
                    <div class="audio-player">
                        <audio src="${data.fileUrl}" controls data-filename="${escapeHtml(data.fileName)}"></audio>
                        <div class="audio-controls">
                            <button onclick="broadcastAudioControl('${safeFileName}', 'play')">▶️ Играть для всех</button>
                            <button onclick="broadcastAudioControl('${safeFileName}', 'pause')">⏸️ Пауза для всех</button>
                        </div>
                    </div>
                `;
            }
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <div class="username">${escapeHtml(data.username)}</div>
                    <div class="message-time">${time}</div>
                </div>
                ${contentHtml}
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function broadcastAudioControl(fileName, action) {
            console.log(`🎮 Управление аудио: ${action} для ${fileName}`);
            
            const audioElements = document.querySelectorAll('audio');
            audioElements.forEach(audio => {
                const audioFileName = audio.getAttribute('data-filename');
                if (audioFileName && audioFileName === fileName) {
                    if (action === 'play') {
                        audio.play().catch(err => console.error('Ошибка воспроизведения:', err));
                    } else if (action === 'pause') {
                        audio.pause();
                    }
                }
            });
            
            socket.emit('audio_control', {
                fileName: fileName,
                action: action,
                username: currentUser,
                timestamp: Date.now()
            });
        }

        function handleRemoteAudioControl(data) {
            if (data.username === currentUser) return;
            
            const audioElements = document.querySelectorAll('audio');
            audioElements.forEach(audio => {
                const fileName = audio.getAttribute('data-filename');
                if (fileName && fileName === data.fileName) {
                    if (data.action === 'play') {
                        audio.play().catch(err => console.error('Ошибка воспроизведения:', err));
                    } else if (data.action === 'pause') {
                        audio.pause();
                    }
                }
            });
        }

        function displaySystemMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message ' + (data.type || '');
            messageDiv.textContent = data.text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text && currentUser && socket) {
                socket.emit('message', { username: currentUser, text: text });
                messageInput.value = '';
            }
        }

        function logout() {
            if (isInVoiceRoom) {
                leaveVoiceRoom();
            }
            if (socket) {
                socket.disconnect();
            }
            localStorage.removeItem('richvoice_user');
            currentUser = null;
            chatContainer.style.display = 'none';
            authContainer.style.display = 'flex';
            usernameInput.value = '';
            passwordInput.value = '';
            errorMessage.textContent = '';
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAuth();
        });

        // ========== ГОЛОСОВАЯ КОМНАТА ==========

        async function toggleVoiceRoom() {
            if (isInVoiceRoom) {
                voiceRoomPanel.classList.remove('active');
                joinVoiceBtn.textContent = '🎤 Голосовая комната';
            } else {
                await joinVoiceRoom();
            }
        }

        async function joinVoiceRoom() {
            try {
                // Запрашиваем доступ к микрофону
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }, 
                    video: false 
                });
                
                console.log('🎤 Микрофон получен');
                
                // Если muted - отключаем аудио
                if (isMuted) {
                    localStream.getAudioTracks().forEach(track => track.enabled = false);
                }
                
                isInVoiceRoom = true;
                voiceRoomPanel.classList.add('active');
                joinVoiceBtn.textContent = '🎤 В комнате';
                
                // Сообщаем серверу
                socket.emit('voice_join', { username: currentUser, roomId: ROOM_ID });
                
                console.log('🎤 Вошёл в голосовую комнату');
                
            } catch (error) {
                console.error(' Ошибка доступа к микрофону:', error);
                alert('Не удалось получить доступ к микрофону. Проверьте разрешения браузера.');
            }
        }

        function leaveVoiceRoom() {
            if (!isInVoiceRoom) return;
            
            // Закрываем все peer connections
            peerConnections.forEach((pc, socketId) => {
                pc.close();
            });
            peerConnections.clear();
            
            // Останавливаем микрофон
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Сообщаем серверу
            socket.emit('voice_leave', { roomId: ROOM_ID });
            
            isInVoiceRoom = false;
            voiceRoomPanel.classList.remove('active');
            joinVoiceBtn.textContent = '🎤 Голосовая комната';
            voiceParticipants.innerHTML = '';
            
            console.log(' Вышел из голосовой комнаты');
        }

        function toggleMute() {
            if (!localStream) return;
            
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => {
                track.enabled = !isMuted;
            });
            
            if (isMuted) {
                muteBtn.textContent = '🔇 Выкл';
                muteBtn.style.background = '#ed4245';
            } else {
                muteBtn.textContent = '🎤 Вкл';
                muteBtn.style.background = '#faa61a';
            }
        }

        async function createPeerConnection(targetSocketId, targetUsername, isInitiator) {
            const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
            
            // Добавляем локальный поток
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    pc.addTrack(track, localStream);
                });
            }
            
            // Обработка ICE candidates
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('voice_ice_candidate', {
                        targetSocketId: targetSocketId,
                        candidate: event.candidate,
                        roomId: ROOM_ID
                    });
                }
            };
            
            // Обработка удалённого потока
            pc.ontrack = (event) => {
                console.log(` Получен аудио поток от ${targetUsername}`);
                
                // Создаём аудио элемент для воспроизведения
                const audio = document.createElement('audio');
                audio.id = `audio_${targetSocketId}`;
                audio.srcObject = event.streams[0];
                audio.autoplay = true;
                audio.style.display = 'none';
                document.body.appendChild(audio);
                
                // Обработка окончания потока
                event.streams[0].onremovetrack = () => {
                    audio.remove();
                };
            };
            
            pc.onconnectionstatechange = () => {
                console.log(`Состояние соединения с ${targetUsername}:`, pc.connectionState);
                
                if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    closePeerConnection(targetSocketId);
                }
            };
            
            peerConnections.set(targetSocketId, pc);
            
            // Если мы инициатор - создаём offer
            if (isInitiator) {
                try {
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    
                    socket.emit('voice_signal', {
                        targetSocketId: targetSocketId,
                        signal: { type: 'offer', sdp: offer },
                        roomId: ROOM_ID
                    });
                    
                    console.log('📤 Отправлен offer для', targetUsername);
                } catch (error) {
                    console.error('Ошибка создания offer:', error);
                }
            }
        }

        async function handleSignal(socketId, signal) {
            let pc = peerConnections.get(socketId);
            
            if (!pc) {
                // Создаём новое соединение
                pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
                
                if (localStream) {
                    localStream.getTracks().forEach(track => {
                        pc.addTrack(track, localStream);
                    });
                }
                
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('voice_ice_candidate', {
                            targetSocketId: socketId,
                            candidate: event.candidate,
                            roomId: ROOM_ID
                        });
                    }
                };
                
                pc.ontrack = (event) => {
                    console.log(` Получен аудио поток от ${socketId}`);
                    
                    const audio = document.createElement('audio');
                    audio.id = `audio_${socketId}`;
                    audio.srcObject = event.streams[0];
                    audio.autoplay = true;
                    audio.style.display = 'none';
                    document.body.appendChild(audio);
                };
                
                pc.onconnectionstatechange = () => {
                    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                        closePeerConnection(socketId);
                    }
                };
                
                peerConnections.set(socketId, pc);
            }
            
            if (signal.type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                socket.emit('voice_signal', {
                    targetSocketId: socketId,
                    signal: { type: 'answer', sdp: answer },
                    roomId: ROOM_ID
                });
                
                console.log('📤 Отправлен answer для', socketId);
            } else if (signal.type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(signal));
                console.log('✅ Получен answer от', socketId);
            }
        }

        function handleIceCandidate(socketId, candidate) {
            const pc = peerConnections.get(socketId);
            if (pc) {
                pc.addIceCandidate(new RTCIceCandidate(candidate))
                    .catch(err => console.error('Ошибка добавления ICE candidate:', err));
            }
        }

        function closePeerConnection(socketId) {
            const pc = peerConnections.get(socketId);
            if (pc) {
                pc.close();
                peerConnections.delete(socketId);
                
                // Удаляем аудио элемент
                const audio = document.getElementById(`audio_${socketId}`);
                if (audio) {
                    audio.remove();
                }
            }
        }

        function updateVoiceParticipants(participants) {
            voiceParticipants.innerHTML = '';
            
            participants.forEach(p => {
                const div = document.createElement('div');
                div.className = 'voice-participant';
                div.id = `participant_${p.socketId}`;
                div.innerHTML = `
                    <span class="mic-icon">🎤</span>
                    <span>${p.username}</span>
                `;
                voiceParticipants.appendChild(div);
            });
            
            // Добавляем себя
            if (isInVoiceRoom) {
                const myDiv = document.createElement('div');
                myDiv.className = 'voice-participant' + (isMuted ? ' muted' : '');
                myDiv.innerHTML = `
                    <span class="mic-icon">${isMuted ? '🔇' : '🎤'}</span>
                    <span>${currentUser} (вы)</span>
                `;
                voiceParticipants.appendChild(myDiv);
            }
        }
    </script>
