<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICH-VOICE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #36393f;
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Стили для форм авторизации */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #36393f;
        }
        .auth-box {
            background: #2f3136;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .auth-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }
        .auth-box input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background: #40444b;
            color: white;
            font-size: 14px;
        }
        .auth-box input:focus {
            outline: none;
            background: #484b52;
        }
        .auth-box button {
            width: 100%;
            padding: 12px;
            background: #00d26a;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .auth-box button:hover {
            background: #00b85c;
        }
        .auth-box .switch-link {
            text-align: center;
            color: #00d26a;
            cursor: pointer;
            font-size: 14px;
        }
        .auth-box .switch-link:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ed4245;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        /* Стили для чата */
        .chat-wrapper {
            display: none;
            height: 100vh;
            flex-direction: row;
        }
        
        /* Боковая панель с онлайн пользователями */
        .sidebar {
            width: 240px;
            background: #2f3136;
            border-right: 1px solid #202225;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 15px 20px;
            border-bottom: 1px solid #202225;
        }
        .sidebar-header h2 {
            font-size: 16px;
            color: #b9bbbe;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .online-list {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .online-user {
            padding: 8px 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .online-user:hover {
            background: #3a3d44;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #00d26a;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0, 210, 106, 0.5);
        }
        .online-count {
            padding: 10px 20px;
            border-top: 1px solid #202225;
            color: #b9bbbe;
            font-size: 13px;
        }
        
        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2f3136;
            padding: 15px 20px;
            border-bottom: 1px solid #202225;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .username-display {
            color: #00d26a;
            font-weight: bold;
        }
        .logout-btn {
            padding: 8px 15px;
            background: #ed4245;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover {
            background: #c03537;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #36393f;
        }
        .message {
            background: #40444b;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }
        .message-content {
            flex: 1;
        }
        .message .username {
            color: #00d26a;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .message-text {
            word-wrap: break-word;
            line-height: 1.4;
        }
        .message-time {
            color: #72767d;
            font-size: 11px;
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }
        
        /* Системные сообщения */
        .system-message {
            text-align: center;
            padding: 8px;
            margin-bottom: 10px;
            color: #72767d;
            font-size: 13px;
            font-style: italic;
        }
        .system-message.join {
            color: #00d26a;
        }
        .system-message.leave {
            color: #ed4245;
        }
        
        .input-area {
            background: #2f3136;
            padding: 20px;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 5px;
            background: #40444b;
            color: white;
            font-size: 14px;
        }
        .input-area input:focus {
            outline: none;
            background: #484b52;
        }
        .input-area button {
            padding: 12px 25px;
            background: #00d26a;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .input-area button:hover {
            background: #00b85c;
        }
    </style>
</head>
<body>
    <!-- Форма авторизации -->
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <h2 id="authTitle">Вход в RICH-VOICE</h2>
            <div class="error-message" id="errorMessage"></div>
            <input type="text" id="usernameInput" placeholder="Имя пользователя" autocomplete="off">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="authButton" onclick="handleAuth()">Войти</button>
            <div class="switch-link" id="switchLink" onclick="switchAuthMode()">Нет аккаунта? Зарегистрироваться</div>
        </div>
    </div>
    
    <!-- Чат -->
    <div class="chat-wrapper" id="chatContainer">
        <!-- Боковая панель с онлайн пользователями -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🟢 В сети</h2>
            </div>
            <div class="online-list" id="onlineList"></div>
            <div class="online-count" id="onlineCount">Онлайн: 0</div>
        </div>
        
        <!-- Основная область чата -->
        <div class="chat-main">
            <div class="header">
                <h1>💬 RICH-VOICE - Общий чат</h1>
                <div class="user-info">
                    <span class="username-display" id="currentUser"></span>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let currentUser = null;
        let isLoginMode = true;
        let socket = null;
        
        const authContainer = document.getElementById('authContainer');
        const chatContainer = document.getElementById('chatContainer');
        const authTitle = document.getElementById('authTitle');
        const authButton = document.getElementById('authButton');
        const switchLink = document.getElementById('switchLink');
        const errorMessage = document.getElementById('errorMessage');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const currentUserDisplay = document.getElementById('currentUser');
        const onlineList = document.getElementById('onlineList');
        const onlineCount = document.getElementById('onlineCount');

        // Проверка сохранённой сессии при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('richvoice_user');
            if (savedUser) {
                currentUser = savedUser;
                showChat();
            }
        });

        // Форматирование даты и времени
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            const isToday = date.toDateString() === today.toDateString();
            const isYesterday = date.toDateString() === yesterday.toDateString();
            
            const time = date.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            if (isToday) {
                return `Сегодня, ${time}`;
            } else if (isYesterday) {
                return `Вчера, ${time}`;
            } else {
                return date.toLocaleDateString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                }) + ', ' + time;
            }
        }

        // Переключение между входом и регистрацией
        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            errorMessage.textContent = '';
            
            if (isLoginMode) {
                authTitle.textContent = 'Вход в RICH-VOICE';
                authButton.textContent = 'Войти';
                switchLink.textContent = 'Нет аккаунта? Зарегистрироваться';
            } else {
                authTitle.textContent = 'Регистрация в RICH-VOICE';
                authButton.textContent = 'Зарегистрироваться';
                switchLink.textContent = 'Уже есть аккаунт? Войти';
            }
        }

        // Обработка авторизации
        async function handleAuth() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                errorMessage.textContent = 'Заполните все поля';
                return;
            }
            
            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Сохраняем в localStorage
                    localStorage.setItem('richvoice_user', data.username);
                    currentUser = data.username;
                    showChat();
                } else {
                    errorMessage.textContent = data.error;
                }
            } catch (error) {
                errorMessage.textContent = 'Ошибка подключения к серверу';
                console.error(error);
            }
        }

        // Показать чат
        function showChat() {
            authContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            currentUserDisplay.textContent = currentUser;
            
            // Подключаемся к Socket.IO
            socket = io({
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000
            });
            
            // Уведомляем сервер о входе
            socket.emit('user_join', currentUser);
            
            // Загружаем историю сообщений
            loadMessages();
            
            // Слушаем новые сообщения
            socket.on('message', (data) => {
                displayMessage(data);
            });
            
            // Слушаем системные сообщения
            socket.on('system_message', (data) => {
                displaySystemMessage(data);
            });
            
            // Слушаем список онлайн пользователей
            socket.on('online_users', (users) => {
                updateOnlineList(users);
            });
        }

        // Обновление списка онлайн
        function updateOnlineList(users) {
            onlineList.innerHTML = '';
            users.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'online-user';
                userDiv.innerHTML = `
                    <div class="status-dot"></div>
                    <span>${user}</span>
                `;
                onlineList.appendChild(userDiv);
            });
            onlineCount.textContent = `Онлайн: ${users.length}`;
        }

        // Загрузка истории сообщений
        async function loadMessages() {
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();
                
                messagesDiv.innerHTML = '';
                messages.forEach(msg => {
                    displayMessage({
                        username: msg.username,
                        text: msg.text,
                        createdAt: msg.createdAt
                    });
                });
            } catch (error) {
                console.error('Ошибка загрузки сообщений:', error);
            }
        }

        // Отображение сообщения
        function displayMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const time = data.createdAt ? formatDateTime(data.createdAt) : 'Только что';
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="username">${escapeHtml(data.username)}</div>
                    <div class="message-text">${escapeHtml(data.text)}</div>
                </div>
                <div class="message-time">${time}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Отображение системного сообщения
        function displaySystemMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message ' + (data.type || '');
            messageDiv.textContent = data.text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Экранирование HTML для безопасности
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Отправка сообщения
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text && currentUser && socket) {
                const messageData = {
                    username: currentUser,
                    text: text
                };
                socket.emit('message', messageData);
                messageInput.value = '';
            }
        }

        // Выход
        function logout() {
            if (socket) {
                socket.disconnect();
            }
            localStorage.removeItem('richvoice_user');
            currentUser = null;
            chatContainer.style.display = 'none';
            authContainer.style.display = 'flex';
            usernameInput.value = '';
            passwordInput.value = '';
            errorMessage.textContent = '';
        }

        // Отправка по Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleAuth();
            }
        });
    </script>
</body>
</html>
