<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICH-VOICE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #36393f;
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #36393f;
        }
        .auth-box {
            background: #2f3136;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .auth-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }
        .auth-box input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background: #40444b;
            color: white;
            font-size: 14px;
        }
        .auth-box input:focus {
            outline: none;
            background: #484b52;
        }
        .auth-box button {
            width: 100%;
            padding: 12px;
            background: #00d26a;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .auth-box button:hover {
            background: #00b85c;
        }
        .auth-box .switch-link {
            text-align: center;
            color: #00d26a;
            cursor: pointer;
            font-size: 14px;
        }
        .auth-box .switch-link:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ed4245;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .chat-wrapper {
            display: none;
            height: 100vh;
            flex-direction: row;
        }
        
        .sidebar {
            width: 240px;
            background: #2f3136;
            border-right: 1px solid #202225;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 15px 20px;
            border-bottom: 1px solid #202225;
        }
        .sidebar-header h2 {
            font-size: 16px;
            color: #b9bbbe;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .online-list {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .online-user {
            padding: 8px 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .online-user:hover {
            background: #3a3d44;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #00d26a;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0, 210, 106, 0.5);
        }
        .online-count {
            padding: 10px 20px;
            border-top: 1px solid #202225;
            color: #b9bbbe;
            font-size: 13px;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2f3136;
            padding: 15px 20px;
            border-bottom: 1px solid #202225;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .username-display {
            color: #00d26a;
            font-weight: bold;
        }
        .logout-btn {
            padding: 8px 15px;
            background: #ed4245;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover {
            background: #c03537;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #36393f;
        }
        .message {
            background: #40444b;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .message .username {
            color: #00d26a;
            font-weight: bold;
        }
        .message-time {
            color: #72767d;
            font-size: 11px;
            white-space: nowrap;
        }
        .message-content {
            word-wrap: break-word;
            line-height: 1.4;
        }
        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 5px;
            margin-top: 8px;
            cursor: pointer;
        }
        .message-audio {
            width: 100%;
            margin-top: 8px;
        }
        .audio-player {
            background: #2f3136;
            padding: 10px;
            border-radius: 5px;
            margin-top: 8px;
        }
        .audio-player audio {
            width: 100%;
        }
        .audio-controls {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .audio-controls button {
            padding: 5px 10px;
            background: #00d26a;
            border: none;
            border-radius: 3px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        .audio-controls button:hover {
            background: #00b85c;
        }
        
        .system-message {
            text-align: center;
            padding: 8px;
            margin-bottom: 10px;
            color: #72767d;
            font-size: 13px;
            font-style: italic;
        }
        .system-message.join {
            color: #00d26a;
        }
        .system-message.leave {
            color: #ed4245;
        }
        
        .input-area {
            background: #2f3136;
            padding: 15px 20px;
            border-top: 1px solid #202225;
        }
        .input-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .toolbar-btn {
            padding: 8px 12px;
            background: #40444b;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar-btn:hover {
            background: #484b52;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        .input-row input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 5px;
            background: #40444b;
            color: white;
            font-size: 14px;
        }
        .input-row input:focus {
            outline: none;
            background: #484b52;
        }
        .input-row button {
            padding: 12px 25px;
            background: #00d26a;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .input-row button:hover {
            background: #00b85c;
        }
        
        /* Панель эмодзи */
        .emoji-panel {
            display: none;
            background: #2f3136;
            border: 1px solid #202225;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .emoji-panel.show {
            display: block;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
        }
        .emoji-btn {
            padding: 8px;
            background: #40444b;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
        }
        .emoji-btn:hover {
            background: #484b52;
        }
        
        /* Скрытые input для файлов */
        .file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <h2 id="authTitle">Вход в RICH-VOICE</h2>
            <div class="error-message" id="errorMessage"></div>
            <input type="text" id="usernameInput" placeholder="Имя пользователя" autocomplete="off">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="authButton" onclick="handleAuth()">Войти</button>
            <div class="switch-link" id="switchLink" onclick="switchAuthMode()">Нет аккаунта? Зарегистрироваться</div>
        </div>
    </div>
    
    <div class="chat-wrapper" id="chatContainer">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🟢 В сети</h2>
            </div>
            <div class="online-list" id="onlineList"></div>
            <div class="online-count" id="onlineCount">Онлайн: 0</div>
        </div>
        
        <div class="chat-main">
            <div class="header">
                <h1>💬 RICH-VOICE - Общий чат</h1>
                <div class="user-info">
                    <span class="username-display" id="currentUser"></span>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area">
                <div class="emoji-panel" id="emojiPanel">
                    <div class="emoji-grid" id="emojiGrid"></div>
                </div>
                
                <div class="input-toolbar">
                    <button class="toolbar-btn" onclick="toggleEmojiPanel()">😊 Эмодзи</button>
                    <button class="toolbar-btn" onclick="document.getElementById('imageInput').click()">️ Картинка</button>
                    <button class="toolbar-btn" onclick="document.getElementById('audioInput').click()">🎵 Музыка</button>
                </div>
                
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
                
                <input type="file" id="imageInput" class="file-input" accept="image/*" onchange="handleImageUpload(event)">
                <input type="file" id="audioInput" class="file-input" accept="audio/*" onchange="handleAudioUpload(event)">
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let currentUser = null;
        let isLoginMode = true;
        let socket = null;
        
        const authContainer = document.getElementById('authContainer');
        const chatContainer = document.getElementById('chatContainer');
        const authTitle = document.getElementById('authTitle');
        const authButton = document.getElementById('authButton');
        const switchLink = document.getElementById('switchLink');
        const errorMessage = document.getElementById('errorMessage');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const currentUserDisplay = document.getElementById('currentUser');
        const onlineList = document.getElementById('onlineList');
        const onlineCount = document.getElementById('onlineCount');
        const emojiPanel = document.getElementById('emojiPanel');
        const emojiGrid = document.getElementById('emojiGrid');

        // Популярные эмодзи
        const emojis = ['😀', '😃', '😄', '😁', '😆', '😅', '🤣', '😂', '🙂', '🙃', '😉', '😊', '😇', '🥰', '😍', '', '😘', '😗', '😚', '😙', '😋', '😛', '😜', '', '😝', '🤑', '🤗', '🤭', '🤫', '🤔', '🤐', '🤨', '😐', '😑', '😶', '😏', '😒', '🙄', '😬', '🤥', '😌', '😔', '😪', '🤤', '😴', '😷', '', '🤕', '🤢', '🤮', '', '🥶', '🥴', '😵', '🤯', '', '🥳', '😎', '🤓', '🧐', '😕', '😟', '🙁', '☹️', '😮', '😯', '😲', '😳', '🥺', '😦', '😧', '😨', '😰', '😥', '😢', '😭', '😱', '😖', '😣', '😞', '😓', '😩', '😫', '🥱', '😤', '😡', '😠', '🤬', '😈', '', '💀', '️', '💩', '', '👹', '', '👻', '👽', '👾', '🤖', '😺', '😸', '', '😻', '😼', '', '🙀', '😿', '😾', '❤️', '🧡', '💛', '💚', '', '💜', '', '🤍', '🤎', '💔', '❣️', '', '💞', '💓', '', '💖', '💘', '', '💟', '☮️', '✝️', '☪️', '️', '☸️', '✡️', '🔯', '🕎', '☯️', '☦️', '🛐', '⛎', '♈', '♉', '♊', '♋', '♌', '♍', '♎', '♏', '♐', '♑', '♒', '♓', '🆔', '⚛️', '🉑', '️', '☣️', '📴', '📳', '🈶', '🈚', '🈸', '', '🈷️', '✴️', '🆚', '', '🉐', '️', '㊗️', '', '🈵', '', '🈲', '🅰️', '🅱️', '', '🆑', '️', '🆘', '❌', '⭕', '', '⛔', '', '🚫', '💯', '💢', '♨️', '', '🚯', '', '🚱', '🔞', '📵', '🚭', '❗', '❕', '❓', '❔', '‼️', '️', '🔅', '', '〽️', '️', '🚸', '🔱', '⚜️', '🔰', '♻️', '✅', '', '⭐', '', '✨', '⚡', '☄️', '💥', '🔥', '🌪️', '🌈', '☀️', '🌤️', '⛅', '️', '☁️', '🌦️', '🌧️', '⛈️', '🌩️', '🌨️', '❄️', '☃️', '⛄', '🌬️', '', '💧', '💦', '', '☂️', '🌊'];

        // Инициализация панели эмодзи
        function initEmojiPanel() {
            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'emoji-btn';
                btn.textContent = emoji;
                btn.onclick = () => insertEmoji(emoji);
                emojiGrid.appendChild(btn);
            });
        }

        function toggleEmojiPanel() {
            emojiPanel.classList.toggle('show');
        }

        function insertEmoji(emoji) {
            messageInput.value += emoji;
            messageInput.focus();
        }

        // Конвертация файла в base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // Загрузка изображения
        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 20 * 1024 * 1024) {
                alert('Файл слишком большой! Максимум 20MB');
                return;
            }
            
            try {
                const base64 = await fileToBase64(file);
                socket.emit('image_upload', {
                    username: currentUser,
                    fileUrl: base64,
                    fileName: file.name
                });
            } catch (error) {
                console.error('Ошибка загрузки изображения:', error);
                alert('Ошибка загрузки изображения');
            }
            
            event.target.value = '';
        }

        // Загрузка аудио
        async function handleAudioUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    console.log('🎵 Выбираю файл:', file.name, 'Размер:', (file.size / 1024 / 1024).toFixed(2), 'MB');
    
    if (file.size > 50 * 1024 * 1024) {
        alert('Файл слишком большой! Максимум 50MB для аудио');
        return;
    }
    
    try {
        console.log('🔄 Конвертирую в base64...');
        const base64 = await fileToBase64(file);
        console.log('✅ Base64 готов, длина:', base64.length);
        
        // Проверяем размер данных перед отправкой
        const payloadSize = (JSON.stringify({
            username: currentUser,
            fileUrl: base64,
            fileName: file.name
        }).length / 1024 / 1024).toFixed(2);
        console.log('📊 Размер данных для отправки:', payloadSize, 'MB');
        
        if (payloadSize > 10) {
            console.warn('⚠️ Данные больше 10MB, может не пройти через Socket.IO');
        }
        
        console.log('📤 Отправляю на сервер...');
        
        socket.emit('audio_upload', {
            username: currentUser,
            fileUrl: base64,
            fileName: file.name
        });
        
        console.log('📨 Отправлено!');
    } catch (error) {
        console.error('❌ Ошибка загрузки аудио:', error);
        alert('Ошибка загрузки аудио: ' + error.message);
    }
    
    event.target.value = '';
}

        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('richvoice_user');
            if (savedUser) {
                currentUser = savedUser;
                showChat();
            }
            initEmojiPanel();
        });

        function formatDateTime(dateString) {
            const date = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            const isToday = date.toDateString() === today.toDateString();
            const isYesterday = date.toDateString() === yesterday.toDateString();
            
            const time = date.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            if (isToday) {
                return `Сегодня, ${time}`;
            } else if (isYesterday) {
                return `Вчера, ${time}`;
            } else {
                return date.toLocaleDateString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                }) + ', ' + time;
            }
        }

        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            errorMessage.textContent = '';
            
            if (isLoginMode) {
                authTitle.textContent = 'Вход в RICH-VOICE';
                authButton.textContent = 'Войти';
                switchLink.textContent = 'Нет аккаунта? Зарегистрироваться';
            } else {
                authTitle.textContent = 'Регистрация в RICH-VOICE';
                authButton.textContent = 'Зарегистрироваться';
                switchLink.textContent = 'Уже есть аккаунт? Войти';
            }
        }

        async function handleAuth() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                errorMessage.textContent = 'Заполните все поля';
                return;
            }
            
            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('richvoice_user', data.username);
                    currentUser = data.username;
                    showChat();
                } else {
                    errorMessage.textContent = data.error;
                }
            } catch (error) {
                errorMessage.textContent = 'Ошибка подключения к серверу';
                console.error(error);
            }
        }

        function showChat() {
            authContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            currentUserDisplay.textContent = currentUser;
            
            socket = io({
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000,
                maxHttpBufferSize: 1e8 // 100MB
            });
            
            socket.emit('user_join', currentUser);
            loadMessages();
            
            socket.on('message', (data) => {
                displayMessage(data);
            });
            
            socket.on('system_message', (data) => {
                displaySystemMessage(data);
            });
            
            socket.on('online_users', (users) => {
                updateOnlineList(users);
            });
            
            socket.on('audio_control', (data) => {
                handleRemoteAudioControl(data);
            });
        }

        function updateOnlineList(users) {
            onlineList.innerHTML = '';
            users.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'online-user';
                userDiv.innerHTML = `
                    <div class="status-dot"></div>
                    <span>${user}</span>
                `;
                onlineList.appendChild(userDiv);
            });
            onlineCount.textContent = `Онлайн: ${users.length}`;
        }

        async function loadMessages() {
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();
                
                messagesDiv.innerHTML = '';
                messages.forEach(msg => {
                    displayMessage({
                        username: msg.username,
                        type: msg.type,
                        text: msg.text,
                        fileUrl: msg.fileUrl,
                        fileName: msg.fileName,
                        createdAt: msg.createdAt
                    });
                });
            } catch (error) {
                console.error('Ошибка загрузки сообщений:', error);
            }
        }

        function displayMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const time = data.createdAt ? formatDateTime(data.createdAt) : 'Только что';
            
            let contentHtml = '';
            
            if (data.type === 'text') {
                contentHtml = `<div class="message-content">${escapeHtml(data.text)}</div>`;
            } else if (data.type === 'image') {
                contentHtml = `
                    <div class="message-content">🖼️ ${escapeHtml(data.fileName)}</div>
                    <img src="${data.fileUrl}" class="message-image" onclick="window.open('${data.fileUrl}', '_blank')">
                `;
            } else if (data.type === 'audio') {
    const safeFileName = escapeHtml(data.fileName).replace(/'/g, "\\'");
    contentHtml = `
        <div class="message-content">🎵 ${escapeHtml(data.fileName)}</div>
        <div class="audio-player">
            <audio src="${data.fileUrl}" controls data-filename="${escapeHtml(data.fileName)}"></audio>
            <div class="audio-controls">
                <button onclick="broadcastAudioControl('${safeFileName}', 'play')">▶️ Играть для всех</button>
                <button onclick="broadcastAudioControl('${safeFileName}', 'pause')">⏸️ Пауза для всех</button>
            </div>
        </div>
    `;
}
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <div class="username">${escapeHtml(data.username)}</div>
                    <div class="message-time">${time}</div>
                </div>
                ${contentHtml}
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Хранилище активных аудио плееров
const activeAudioPlayers = new Map();

function broadcastAudioControl(fileName, action) {
    console.log(`🎮 Управление аудио: ${action} для ${fileName}`);
    
    // Сначала запускаем у себя
    const audioElements = document.querySelectorAll('audio');
    audioElements.forEach(audio => {
        if (audio.src && audio.src.includes(fileName)) {
            console.log(`▶️ Запускаю у себя: ${action}`);
            if (action === 'play') {
                audio.play().catch(err => console.error('Ошибка воспроизведения:', err));
            } else if (action === 'pause') {
                audio.pause();
            }
        }
    });
    
    // Затем отправляем всем остальным
    socket.emit('audio_control', {
        fileName: fileName,
        action: action,
        username: currentUser,
        timestamp: Date.now()
    });
}

function handleRemoteAudioControl(data) {
    console.log(`🎧 Получено управление аудио: ${data.action} от ${data.username}`);
    
    // Не реагируем на свои собственные команды
    if (data.username === currentUser) {
        console.log('⏭️ Пропускаем своё событие');
        return;
    }
    
    // Ищем все аудио элементы
    const audioElements = document.querySelectorAll('audio');
    console.log(`🔍 Найдено аудио плееров: ${audioElements.length}`);
    
    let found = false;
    
    audioElements.forEach((audio, index) => {
        const fileName = audio.getAttribute('data-filename');
        console.log(`Плеер ${index}: data-filename="${fileName}"`);
        
        // Сравниваем имена файлов
        if (fileName && fileName === data.fileName) {
            found = true;
            console.log(`✅ Нашёл плеер! Выполняю: ${data.action}`);
            
            if (data.action === 'play') {
                audio.play().catch(err => {
                    console.error('❌ Ошибка воспроизведения:', err);
                    alert('Не удалось воспроизвести аудио. Попробуйте ещё раз.');
                });
            } else if (data.action === 'pause') {
                audio.pause();
            }
        }
    });
    
    if (!found) {
        console.log(`⚠️ Плеер не найден для файла: ${data.fileName}`);
        console.log('Доступные файлы в плеерах:');
        audioElements.forEach(audio => {
            console.log('-', audio.getAttribute('data-filename'));
        });
    }
}

        function displaySystemMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message ' + (data.type || '');
            messageDiv.textContent = data.text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text && currentUser && socket) {
                socket.emit('message', {
                    username: currentUser,
                    text: text
                });
                messageInput.value = '';
            }
        }

        function logout() {
            if (socket) {
                socket.disconnect();
            }
            localStorage.removeItem('richvoice_user');
            currentUser = null;
            chatContainer.style.display = 'none';
            authContainer.style.display = 'flex';
            usernameInput.value = '';
            passwordInput.value = '';
            errorMessage.textContent = '';
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleAuth();
            }
        });
    </script>
